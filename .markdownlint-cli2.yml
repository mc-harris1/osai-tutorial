config:
  default: true

# Permit long URLs and commands.

MD013:
  line_length: 120
  code_blocks: false
  tables: false

# Permit repeated headings in separate sections.

MD024:
  siblings_only: true

# Allow inline HTML when useful for documentation.

MD033: false

# Do not require the repository title to be the first line of every file.

MD041: false

globs:
  - "**/*.md"
  - "!node_modules/**"
  - "!site/**"
