name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: markdown-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
